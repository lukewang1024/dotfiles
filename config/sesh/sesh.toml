# sesh - smart tmux session manager (https://github.com/joshmedeski/sesh)
# Symlinked to $XDG_CONFIG_HOME/sesh/sesh.toml by tmux_setup in bootstrap/shell.sh.

# Coding layouts are owned by tmuxinator (declarative, per-project):
#   - repo-local ./.tmuxinator.yml   →  `tmuxinator local` / `mux start .`
#   - named ~/.config/tmuxinator/*.yml → shown in this picker (sesh --tmuxinator),
#     selecting one runs `tmuxinator start <name>`.
# sesh stays the switcher; a bare-dir connect just drops you in a shell. Pop the
# agent sidebar with prefix+Tab.
[default_session]

[[session]]
name = "dotfiles ⚙️"
path = "~/.dotfiles"
startup_command = "nvim"
preview_command = "ls -la ~/.dotfiles"

[[session]]
name = "tmux config 🪟"
path = "~/.config/tmux"
startup_command = "nvim tmux.conf"
preview_command = "bat --color=always --style=plain ~/.config/tmux/tmux.conf 2>/dev/null || cat ~/.config/tmux/tmux.conf"

# Per-machine repos are intentionally NOT listed here (dotfiles stay generic);
# put them in machine-local ~/.config/tmuxinator/*.yml (repo names live there,
# untracked) or a repo-local ./.tmuxinator.yml.
